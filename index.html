<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Storage Is Full</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #1f6b7a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MODAL */
.modal {
    background: #f3f3f3;
    width: 320px;
    padding: 30px 20px;
    border-radius: 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);

    animation: scaleIn 0.4s ease;
}

/* SHADOW LAYER */
.modal::before,
.modal::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background: rgba(0,0,0,0.2);
    top: 10px;
    left: 10px;
    z-index: -1;
}
.modal::after {
    top: 20px;
    left: 20px;
    opacity: 0.5;
}

/* ICON */
.icon {
    font-size: 45px;
}

/* TEXT */
h2 { margin: 10px 0; }
p { font-size: 14px; }

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

.btn-upgrade {
    background: #4caf50;
    color: white;
}

.btn-close {
    background: #ff4d4d;
    color: white;
}

/* ANIMASI */
@keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.7);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>
</head>

<body>

<div class="overlay" id="popup">
    <div class="modal">
        <div class="icon">⚠️</div>
        <h2>Database capacity exceeded</h2>
        <p>
            You have reached the database limit.<br>
            Please upgrade your package to continue..
        </p>

        <button class="btn btn-upgrade" onclick="upgrade()">
            🚀 Upgrade Now!
        </button>

        <button class="btn btn-close" onclick="tutup()">
            Close
        </button>
    </div>
</div>

<script>
// tombol upgrade → redirect
function upgrade() {
    window.location.href = "https://example.com/upgrade"; // ganti link
}

// tutup manual
function tutup() {
    document.getElementById("popup").style.display = "none";
}

// auto close + redirect (5 detik)
setTimeout(() => {
    window.location.href = "https://example.com/upgrade";
}, 5000);
</script>

</body>
</html>
